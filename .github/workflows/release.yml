name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Download proto file
        run: node download-proto.cjs || true
        shell: bash
        continue-on-error: true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "HappyCD2 ${{ github.ref_name }}"
          releaseBody: |
            ## HappyCD2 ${{ github.ref_name }}

            CloudDrive2 GUI 管理器 — 原生 gRPC 客户端，无需 Node.js！

            ### 下载说明
            - **安装版**: 下载 `.exe`（NSIS）或 `.msi` 安装包，双击安装即可
            - **绿色便携版**: 下载 `HappyCD2-Portable-x64.zip`，解压后运行 `HappyCD2.exe`，无需安装

            ### 系统要求
            - Windows 10/11 (64位)
            - CloudDrive2 服务端运行中
            - **无需 Node.js** — 完全原生编译，gRPC 直接内置

            ### 使用方法
            1. 下载应用（安装版或便携版）
            2. 确保 CloudDrive2 服务端正在运行
            3. 启动 HappyCD2
            4. 首次使用请前往「设置 → 连接配置」配置服务器地址和 API Key
            5. 开始管理你的云盘文件

            ### v1.0.2 更新
            - 🚀 **移除 Node.js 依赖** — 使用 Rust 原生 gRPC 客户端，无需安装 Node.js
            - 🔧 修复首次运行 UNAUTHENTICATED 错误，正确显示登录界面
            - 📦 便携版不再需要 backend 文件夹，单个 exe 即可运行
            - ⚡ 性能提升 — 原生 gRPC 通信，减少中间层
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      # ==================== Portable Build ====================
      - name: Build portable version
        shell: pwsh
        run: |
          Write-Host "Building portable version..."
          $exePath = "src-tauri\target\x86_64-pc-windows-msvc\release\happycd2.exe"
          $portableDir = "HappyCD2-Portable"
          New-Item -ItemType Directory -Force -Path $portableDir
          Copy-Item $exePath "$portableDir\HappyCD2.exe"
          @"
          HappyCD2 便携版 v1.0.2
          ========================

          使用方法:
          1. 确保 CloudDrive2 服务端正在运行
          2. 双击 HappyCD2.exe 启动
          3. 首次使用请前往「设置 → 连接配置」配置服务器地址和 API Key

          特点:
          - 完全原生编译，无需 Node.js
          - 不写入注册表，可随时删除整个文件夹卸载
          - gRPC 客户端内置，直接连接 CloudDrive2 服务端
          "@ | Out-File -FilePath "$portableDir\README.txt" -Encoding UTF8
          Compress-Archive -Path $portableDir -DestinationPath "HappyCD2-Portable-x64.zip" -Force
          Write-Host "Portable version created: HappyCD2-Portable-x64.zip"

      - name: Upload portable zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: HappyCD2-Portable-x64.zip
          tag_name: ${{ github.ref_name }}
